# Lucien · 智研 個人品牌網站 + FreeLLMAPI Proxy + Hermes Mini App
# ── HTTP → HTTPS redirect ────────────────────────
server {
    listen 80;
    server_name zhiyan.dev www.zhiyan.dev lucien126.com www.lucien126.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name zhiyan.dev www.zhiyan.dev lucien126.com www.lucien126.com;

    ssl_certificate /etc/letsencrypt/live/lucien126.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lucien126.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/brand-site;

    # ── 安全標頭 ────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    add_header X-XSS-Protection "0";

    # ── Admin Dashboard (FreeLLMAPI) ─────────────────
    location /admin/ {
        auth_basic "智研 Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/assets/' 'href="/admin/assets/';
        sub_filter 'src="/assets/' 'src="/admin/assets/';
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    location /admin/assets/ {
        auth_basic "智研 Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:3001/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 1h;
    }

    location /admin/favicon.svg {
        auth_basic "智研 Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:3001/favicon.svg;
        proxy_http_version 1.1;
    }

    # ── AI API Proxy（FreeLLMAPI） ──────────────────
    location /api/ai/ {
        rewrite ^/api/ai/(.*) /v1/$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        proxy_set_header X-Original-Auth $http_authorization;
        proxy_set_header Authorization "";
        proxy_set_header Authorization "Bearer freellmapi-753f4ce293c4490259774f8afc7280313d1c8c4de43d06a1";
        limit_req zone=ai_api burst=10 nodelay;
    }

    # ── 智研法律 API Proxy ──────────────────────────
    location /api/legal/ {
        rewrite ^/api/legal/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── Mini App API Proxy (Hermes Proxy Console) ────
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Mini App assets ─────────────────────────────
    location ^~ /assets/ {
        alias /var/www/brand-site/m/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Mini App static (React SPA) ─────────────────
    location /m/ {
        alias /var/www/brand-site/m/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri $uri/ /m/index.html;
    }

    # ── Root ────────────────────────────────────────
    location = / {
        rewrite ^ /home.dc.html last;
    }

    location / {
        try_files $uri $uri.dc.html $uri/ =404;
    }

    location ~* .(html?)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /hci/ {
        proxy_pass http://127.0.0.1:10274/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
