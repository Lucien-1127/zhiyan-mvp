<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif; font-size: 15px; line-height: 1.6; color: #1a2332; background: #f5f6fa; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
  </style>
</helmet>

<div style="display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #f5f6fa;">

  <!-- 行動側邊欄 -->
  <nav id="sidebarMobile" style="position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #1a2332; color: #c8d0dc; z-index: 200; transform: translateX(-100%); transition: transform 0.3s ease; display: flex; flex-direction: column; padding: 0; overflow-y: auto;">
    <div style="padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 32px;">⚖️</span>
        <div>
          <h1 style="font-size: 20px; font-weight: 700; color: #ffffff; letter-spacing: 1px; margin: 0;">智研</h1>
          <span style="font-size: 11px; color: #8b9ab0; letter-spacing: 2px; text-transform: uppercase; display: block;">AI 法律系統</span>
        </div>
      </div>
    </div>

    <nav style="flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px;">
      <button onclick="switchPage('chat'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c9a84c; background: rgba(201,168,76,0.15); cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;">
        <span>💬</span> 法律諮詢
      </button>
      <button onclick="switchPage('contract'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c8d0dc; background: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#ffffff';" onmouseout="this.style.background='none'; this.style.color='#c8d0dc';">
        <span>📄</span> 合約產生
      </button>
      <button onclick="switchPage('monitor'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c8d0dc; background: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#ffffff';" onmouseout="this.style.background='none'; this.style.color='#c8d0dc';">
        <span>📊</span> 法規異動
      </button>
      <button onclick="switchPage('search'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c8d0dc; background: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#ffffff';" onmouseout="this.style.background='none'; this.style.color='#c8d0dc';">
        <span>🔍</span> 智慧搜尋
      </button>
      <button onclick="switchPage('osint'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c8d0dc; background: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#ffffff';" onmouseout="this.style.background='none'; this.style.color='#c8d0dc';">
        <span>🕵️</span> 徵信調查
      </button>
      <button onclick="switchPage('summary'); closeSidebar();" style="display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; color: #c8d0dc; background: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all 0.15s; border: none;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#ffffff';" onmouseout="this.style.background='none'; this.style.color='#c8d0dc';">
        <span>📋</span> AI 摘要
      </button>
    </nav>

    <div style="padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06);">
      <div style="font-size: 11px; color: #8b9ab0; margin-bottom: 8px;">已登入</div>
      <div style="font-size: 12px; color: #c8d0dc; margin-bottom: 8px;">謝小育</div>
      <button style="width: 100%; padding: 8px 12px; background: rgba(201,168,76,0.15); color: #c9a84c; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; border: none; font-family: inherit;" onmouseover="this.style.background='rgba(201,168,76,0.25)';" onmouseout="this.style.background='rgba(201,168,76,0.15)';">登出</button>
    </div>
  </nav>

  <!-- 遮罩層 -->
  <div id="sidebarOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; opacity: 0; transition: opacity 0.3s ease;" onclick="closeSidebar();"></div>

  <!-- 主內容區 -->
  <main style="flex: 1; display: flex; flex-direction: column; min-width: 0; background: #f5f6fa; overflow: hidden;">

    <!-- 頂欄 -->
    <header style="background: #ffffff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; min-height: 56px; flex-shrink: 0;">
      <button id="menuToggle" onclick="toggleSidebar()" style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; background: none; cursor: pointer;" onmouseover="this.style.background='#f5f6fa';" onmouseout="this.style.background='none';">☰</button>
      <h1 id="pageTitle" style="font-size: 18px; font-weight: 600; margin: 0; flex: 1; text-align: center;">法律諮詢</h1>
      <button style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; background: none; cursor: pointer;" onclick="showProfile()" onmouseover="this.style.background='#f5f6fa';" onmouseout="this.style.background='none';">👤</button>
    </header>

    <!-- 頁面容器 -->
    <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;">
      
      <!-- 法律諮詢頁面 -->
      <div id="chatPage" style="display: flex; flex-direction: column; flex: 1;">
        <div style="flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
          <div style="font-size: 64px; margin-bottom: 16px;">⚖️</div>
          <h2 style="font-size: 24px; font-weight: 700; color: #1a2332; margin-bottom: 8px;">智研 AI 法律系統</h2>
          <p style="color: #6b7280; font-size: 14px; max-width: 400px; margin-bottom: 32px;">
            台灣法律 AI 研究助手 · 5 層架構 · 強制引用 · 安全優先
          </p>
          <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 500px;">
            <button onclick="askQuestion(this)" style="padding: 10px 18px; border: 1px solid #e5e7eb; border-radius: 20px; font-size: 13px; color: #6b7280; background: #ffffff; transition: all 0.2s; cursor: pointer; font-family: inherit; border: 1px solid #e5e7eb;" onmouseover="this.style.borderColor='#c9a84c'; this.style.color='#c9a84c'; this.style.background='rgba(201,168,76,0.05)';" onmouseout="this.style.borderColor='#e5e7eb'; this.style.color='#6b7280'; this.style.background='#ffffff';">
              公然侮辱罪的構成要件是什麼？
            </button>
            <button onclick="askQuestion(this)" style="padding: 10px 18px; border: 1px solid #e5e7eb; border-radius: 20px; font-size: 13px; color: #6b7280; background: #ffffff; transition: all 0.2s; cursor: pointer; font-family: inherit; border: 1px solid #e5e7eb;" onmouseover="this.style.borderColor='#c9a84c'; this.style.color='#c9a84c'; this.style.background='rgba(201,168,76,0.05)';" onmouseout="this.style.borderColor='#e5e7eb'; this.style.color='#6b7280'; this.style.background='#ffffff';">
              離婚訴訟需要準備哪些文件？
            </button>
          </div>
        </div>
        <div style="padding: 16px 24px 12px; background: #ffffff; border-top: 1px solid #e5e7eb; flex-shrink: 0;">
          <div style="display: flex; align-items: flex-end; gap: 8px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 8px 8px 8px 16px;">
            <textarea id="messageInput" placeholder="輸入您的法律問題..." style="flex: 1; border: none; outline: none; resize: none; max-height: 120px; font-size: 14px; line-height: 1.5; color: #1a2332; background: transparent; font-family: inherit;"></textarea>
            <button style="width: 36px; height: 36px; border-radius: 50%; background: #c9a84c; color: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; border: none; cursor: pointer;" onmouseover="this.style.background='#d4b85a'; this.style.transform='scale(1.05)';" onmouseout="this.style.background='#c9a84c'; this.style.transform='none';">
              ➤
            </button>
          </div>
        </div>
      </div>

      <!-- 合約產生頁面 -->
      <div id="contractPage" style="display: none; flex-direction: column; flex: 1; padding: 16px;">
        <div style="background: #ffffff; border-radius: 12px; padding: 24px; text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">📄</div>
          <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">合約自動產生</h2>
          <p style="color: #6b7280; margin-bottom: 24px;">基於您的需求，AI 自動生成法律合約範本</p>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <button style="padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px; transition: all 0.15s;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">保密協議 (NDA)</button>
            <button style="padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px; transition: all 0.15s;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">服務條款</button>
            <button style="padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px; transition: all 0.15s;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">融資協議</button>
          </div>
        </div>
      </div>

      <!-- 法規異動頁面 -->
      <div id="monitorPage" style="display: none; flex-direction: column; flex: 1; padding: 16px;">
        <div style="background: #ffffff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e5e7eb;">
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
            <div style="text-align: center;"><div style="font-size: 24px; font-weight: bold; color: #22c55e;">12</div><div style="font-size: 12px; color: #6b7280;">追蹤中</div></div>
            <div style="text-align: center;"><div style="font-size: 24px; font-weight: bold; color: #ef4444;">3</div><div style="font-size: 12px; color: #6b7280;">有異動</div></div>
          </div>
        </div>
        <button style="padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">執行查核</button>
      </div>

      <!-- 智慧搜尋頁面 -->
      <div id="searchPage" style="display: none; flex-direction: column; flex: 1; padding: 16px;">
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
          <input type="text" placeholder="搜尋判決書、法規、條款..." style="flex: 1; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px;">
          <button style="padding: 12px 16px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit;">搜尋</button>
        </div>
        <div style="background: #ffffff; border-radius: 12px; padding: 24px; text-align: center; color: #9ca3af;">
          輸入關鍵字開始搜尋...
        </div>
      </div>

      <!-- 徵信調查頁面 -->
      <div id="osintPage" style="display: none; flex-direction: column; flex: 1; padding: 16px;">
        <div style="background: #ffffff; border-radius: 12px; padding: 24px; text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">🕵️</div>
          <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">背景調查報告</h2>
          <input type="text" placeholder="輸入人名或公司名..." style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; margin-bottom: 12px;">
          <button style="width: 100%; padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">開始調查</button>
        </div>
      </div>

      <!-- AI 摘要頁面 -->
      <div id="summaryPage" style="display: none; flex-direction: column; flex: 1; padding: 16px;">
        <div style="background: #ffffff; border-radius: 12px; padding: 24px; text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
          <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">文件自動摘要</h2>
          <textarea placeholder="貼上文件內容或上傳檔案..." style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; min-height: 100px; margin-bottom: 12px;"></textarea>
          <button style="width: 100%; padding: 12px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">生成摘要</button>
        </div>
      </div>

    </div>

  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;375px&quot;,&quot;height&quot;:&quot;812px&quot;}}">
class Component extends DCLogic {
  state = {
    currentPage: 'chat',
    sidebarOpen: false,
  };

  switchPage = (page) => {
    this.setState({ currentPage: page });
    
    const pageMap = {
      'chat': '法律諮詢',
      'contract': '合約產生',
      'monitor': '法規異動',
      'search': '智慧搜尋',
      'osint': '徵信調查',
      'summary': 'AI 摘要',
    };
    
    document.getElementById('pageTitle').textContent = pageMap[page] || '智研';
    
    // 隱藏所有頁面
    document.getElementById('chatPage').style.display = 'none';
    document.getElementById('contractPage').style.display = 'none';
    document.getElementById('monitorPage').style.display = 'none';
    document.getElementById('searchPage').style.display = 'none';
    document.getElementById('osintPage').style.display = 'none';
    document.getElementById('summaryPage').style.display = 'none';
    
    // 顯示選中頁面
    document.getElementById(page + 'Page').style.display = 'flex';
  };

  toggleSidebar = () => {
    this.setState({ sidebarOpen: !this.state.sidebarOpen });
    const sidebar = document.getElementById('sidebarMobile');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (this.state.sidebarOpen) {
      sidebar.style.transform = 'translateX(0)';
      overlay.style.display = 'block';
      setTimeout(() => { overlay.style.opacity = '1'; }, 0);
    } else {
      sidebar.style.transform = 'translateX(-100%)';
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 300);
    }
  };

  closeSidebar = () => {
    this.setState({ sidebarOpen: false });
    document.getElementById('sidebarMobile').style.transform = 'translateX(-100%)';
    document.getElementById('sidebarOverlay').style.opacity = '0';
    setTimeout(() => { 
      document.getElementById('sidebarOverlay').style.display = 'none'; 
    }, 300);
  };

  askQuestion = (btn) => {
    const input = document.getElementById('messageInput');
    input.value = btn.textContent;
  };

  showProfile = () => {
    alert('用戶設定頁面（建設中）');
  };

  renderVals() {
    return {
      switchPage: this.switchPage,
      toggleSidebar: this.toggleSidebar,
      closeSidebar: this.closeSidebar,
      askQuestion: this.askQuestion,
      showProfile: this.showProfile,
    };
  }
}
</script>
</body>
</html>
