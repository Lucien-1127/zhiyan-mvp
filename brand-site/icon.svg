<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2938"/>
      <stop offset="100%" stop-color="#0f1a24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 智字（簡化） -->
  <text x="256" y="220" font-family="sans-serif" font-weight="700" font-size="180" fill="#ff6b35" text-anchor="middle" dominant-baseline="central">智</text>
  <!-- L 字母疊加 -->
  <text x="256" y="360" font-family="sans-serif" font-weight="700" font-size="80" fill="#ffffff" text-anchor="middle" dominant-baseline="central" opacity=".85">L</text>
  <!-- 裝飾點 -->
  <circle cx="180" cy="400" r="6" fill="#ff6b35" opacity=".6"/>
  <circle cx="332" cy="400" r="6" fill="#ff6b35" opacity=".6"/>
</svg>
