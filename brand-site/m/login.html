<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Proxy Console — 登入</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-container {
  width: 100%;
  max-width: 400px;
  padding: 24px;
}
.login-card {
  background: #1e293b;
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  text-align: center;
}
.login-card h1 {
  font-size: 24px;
  margin-bottom: 32px;
  font-weight: 600;
  color: #f1f5f9;
}
.input-group {
  margin-bottom: 16px;
}
.login-card input {
  width: 100%;
  padding: 14px 16px;
  background: #334155;
  border: 1px solid #475569;
  border-radius: 10px;
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.login-card input:focus {
  border-color: #22c55e;
}
.login-card input::placeholder {
  color: #64748b;
}
.login-card button {
  width: 100%;
  padding: 14px;
  background: #22c55e;
  color: #0f172a;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.login-card button:hover {
  background: #16a34a;
}
.login-card button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
#error {
  color: #ef4444;
  margin-top: 16px;
  font-size: 14px;
  display: none;
}
.status-badge {
  margin-top: 24px;
  padding: 8px 12px;
  background: #334155;
  border-radius: 8px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h1>🔐 Hermes Proxy Console</h1>
    <div class="input-group">
      <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
    </div>
    <button id="loginBtn" onclick="login()">登入</button>
    <div id="error"></div>
    <div class="status-badge">Hermes Proxy Console v4.0</div>
  </div>
</div>

<script>
const passwordInput = document.getElementById('password');
const errorDiv = document.getElementById('error');
const loginBtn = document.getElementById('loginBtn');

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
}

function hideError() {
  errorDiv.style.display = 'none';
}

async function login() {
  const password = passwordInput.value.trim();
  if (!password) {
    showError('請輸入密碼');
    return;
  }

  hideError();
  loginBtn.disabled = true;
  loginBtn.textContent = '登入中…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || '登入失敗');
      loginBtn.disabled = false;
      loginBtn.textContent = '登入';
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = '/m/';
  } catch (err) {
    showError('網路錯誤，請稍後再試');
    loginBtn.disabled = false;
    loginBtn.textContent = '登入';
  }
}

passwordInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    login();
  }
});

passwordInput.focus();
</script>
</body>
</html>
