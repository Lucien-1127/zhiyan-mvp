<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif; font-size: 15px; line-height: 1.6; color: #1a2332; background: #f5f5f5; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</helmet>

<div style="display: flex; flex-direction: column; height: 100vh; background: #f5f5f5;">

  <!-- 頂部欄 -->
  <header style="background: #ffffff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb;">
    <button style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #1a2332;">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 style="font-size: 18px; font-weight: 600; margin: 0; flex: 1; text-align: center;">搜尋法規</h1>
    <div style="width: 40px;"></div>
  </header>

  <!-- 搜尋欄 -->
  <div style="padding: 16px; background: #ffffff; border-bottom: 1px solid #e5e7eb;">
    <div style="display: flex; align-items: center; gap: 8px; background: #f5f5f5; border-radius: 12px; padding: 8px 12px; border: 1px solid #e5e7eb;">
      <span class="material-symbols-outlined" style="color: #6b7280;">search</span>
      <input id="searchInput" type="text" placeholder="輸入法規名稱…" style="flex: 1; border: none; outline: none; background: transparent; font-family: inherit; font-size: 15px;" onkeyup="filterLaws()">
      <button id="clearBtn" style="display: none; color: #6b7280;" onclick="clearSearch()">
        <span class="material-symbols-outlined" style="font-size: 20px;">clear</span>
      </button>
    </div>
  </div>

  <!-- 內容區 -->
  <main style="flex: 1; overflow-y: auto; padding: 12px;">

    <!-- 初始提示 -->
    <div id="hint" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; animation: fadeIn 0.5s ease;">
      <span class="material-symbols-outlined" style="font-size: 48px; color: #d1d5db; margin-bottom: 16px;">search</span>
      <p style="color: #6b7280; margin-bottom: 8px;">輸入法規名稱關鍵字搜尋</p>
      <p style="color: #9ca3af; font-size: 14px;">例如：毒品、勞動、公司、刑法</p>
    </div>

    <!-- 搜尋結果 -->
    <div id="results" style="display: none; flex-direction: column; gap: 8px;">

      <!-- 結果卡片 1 -->
      <div style="background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 12px; display: flex; gap: 12px; align-items: flex-start;">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; color: #2563eb; font-weight: bold; font-size: 14px; flex-shrink: 0;">法</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 500; font-size: 15px; color: #1a2332; margin-bottom: 4px;">刑法</div>
          <p style="font-size: 12px; color: #6b7280; margin: 0;">法律 · 修正 20240731</p>
        </div>
        <button style="padding: 6px 12px; background: #1A5276; color: #ffffff; border-radius: 6px; border: none; cursor: pointer; font-size: 12px;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">
          追蹤
        </button>
      </div>

      <!-- 結果卡片 2 -->
      <div style="background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 12px; display: flex; gap: 12px; align-items: flex-start;">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #fee2e2; display: flex; align-items: center; justify-content: center; color: #dc2626; font-weight: bold; font-size: 14px; flex-shrink: 0;">令</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 500; font-size: 15px; color: #1a2332; margin-bottom: 4px;">刑事訴訟法施行細則</div>
          <p style="font-size: 12px; color: #6b7280; margin: 0;">法規命令 · 修正 20240615</p>
        </div>
        <button style="padding: 6px 12px; background: #1A5276; color: #ffffff; border-radius: 6px; border: none; cursor: pointer; font-size: 12px;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">
          追蹤
        </button>
      </div>

      <!-- 結果卡片 3 -->
      <div style="background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 12px; display: flex; gap: 12px; align-items: flex-start;">
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; color: #2563eb; font-weight: bold; font-size: 14px; flex-shrink: 0;">法</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 500; font-size: 15px; color: #1a2332; margin-bottom: 4px;">組織犯罪防制條例</div>
          <p style="font-size: 12px; color: #6b7280; margin: 0;">法律 · 修正 20231201</p>
        </div>
        <button style="padding: 6px 12px; background: #c0c0c0; color: #ffffff; border-radius: 6px; border: none; cursor: not-allowed; font-size: 12px;" disabled>
          已追蹤
        </button>
      </div>

    </div>

  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;375px&quot;,&quot;height&quot;:&quot;812px&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      filterLaws: () => {
        const input = document.getElementById('searchInput');
        const hasText = input.value.trim().length > 0;
        document.getElementById('clearBtn').style.display = hasText ? 'block' : 'none';
        if (hasText) {
          document.getElementById('hint').style.display = 'none';
          document.getElementById('results').style.display = 'flex';
        } else {
          document.getElementById('hint').style.display = 'flex';
          document.getElementById('results').style.display = 'none';
        }
      },
      clearSearch: () => {
        const input = document.getElementById('searchInput');
        input.value = '';
        document.getElementById('clearBtn').style.display = 'none';
        document.getElementById('hint').style.display = 'flex';
        document.getElementById('results').style.display = 'none';
      },
    };
  }
}
</script>
</body>
</html>
