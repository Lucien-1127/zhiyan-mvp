<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif; font-size: 15px; line-height: 1.6; color: #1a2332; background: #f5f6fa; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    input, textarea { font: inherit; color: inherit; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</helmet>

<div style="display: flex; flex-direction: column; height: 100vh; background: #f5f6fa;">

  <header style="background: #ffffff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb;">
    <button style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #1a2332; font-size: 18px;">←</button>
    <h1 style="font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin: 0;">智慧搜尋</h1>
    <div style="width: 40px;"></div>
  </header>

  <main style="flex: 1; overflow-y: auto; padding: 16px;">

    <!-- 搜尋欄 -->
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <input id="searchInput" type="text" placeholder="搜尋判決書、法規、條款..." style="flex: 1; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px;">
      <button onclick="performSearch()" style="padding: 12px 20px; background: #1A5276; color: #ffffff; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; font-weight: 600;" onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">搜尋</button>
    </div>

    <!-- 搜尋類型篩選 -->
    <div style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;">
      <button style="padding: 8px 14px; background: #c9a84c; color: #ffffff; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: inherit;">全部</button>
      <button style="padding: 8px 14px; background: #f5f5f5; color: #6b7280; border-radius: 20px; border: 1px solid #e5e7eb; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: inherit;" onmouseover="this.style.background='#f0f0f0';" onmouseout="this.style.background='#f5f5f5';">判決書</button>
      <button style="padding: 8px 14px; background: #f5f5f5; color: #6b7280; border-radius: 20px; border: 1px solid #e5e7eb; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: inherit;" onmouseover="this.style.background='#f0f0f0';" onmouseout="this.style.background='#f5f5f5';">法規</button>
      <button style="padding: 8px 14px; background: #f5f5f5; color: #6b7280; border-radius: 20px; border: 1px solid #e5e7eb; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: inherit;" onmouseover="this.style.background='#f0f0f0';" onmouseout="this.style.background='#f5f5f5';">條款</button>
    </div>

    <!-- 搜尋結果 -->
      <div id="results" style="display: none; animation: fadeIn 0.3s ease;">
        <div id="resultsList"></div>
        <div id="noResults" style="display: none; text-align: center; padding: 40px; color: #9ca3af;">
          無搜尋結果
        </div>
      </div>

      <!-- 初始狀態 -->
      <div id="emptyState" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px;">
        <div style="font-size: 48px; margin-bottom: 16px;">🔍</div>
        <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">智慧法規搜尋</h2>
        <p style="color: #6b7280; font-size: 14px;">輸入關鍵字搜尋台灣法規條文</p>
      </div>

    </main>
    </div>
    </x-dc>
    <script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;375px&quot;,&quot;height&quot;:&quot;812px&quot;}}">
    class Component extends DCLogic {
    performSearch = async () => {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('resultsList').innerHTML = '<div style="text-align:center;padding:20px;color:#6b7280;">⏳ 搜尋中...</div>';

      try {
        const res = await fetch(`/api/search/query?query=${encodeURIComponent(query)}&limit=10`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        if (data.total === 0) {
          document.getElementById('noResults').style.display = 'block';
          return;
        }
        document.getElementById('noResults').style.display = 'none';

        data.results.forEach(r => {
          const div = document.createElement('div');
          div.style.cssText = 'background:#ffffff;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #e5e7eb;';
          div.innerHTML = `
            <div style="font-weight:600;color:#1a2332;margin-bottom:4px;">${r.law_name} ${r.article_number ? '第' + r.article_number + '條' : ''}</div>
            <div style="font-size:13px;color:#6b7280;line-height:1.6;">${r.content.slice(0, 200)}${r.content.length > 200 ? '...' : ''}</div>
          `;
          list.appendChild(div);
        });
      } catch (err) {
        document.getElementById('resultsList').innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;">❌ 搜尋失敗：${err.message}</div>`;
      }
    };

    renderVals() {
      return { performSearch: this.performSearch };
    }
    }
    </script>
