name: "CodeQL 程式碼審查"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 14 * * 0'  # 每週日 14:00 UTC

jobs:
  analyze:
    name: CodeQL 分析
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ python ]

    steps:
    - name: 下載程式碼
      uses: actions/checkout@v4

    - name: 初始化 CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: 手動建置
      uses: github/codeql-action/autobuild@v3

    - name: 執行 CodeQL 分析
      uses: github/codeql-action/analyze@v3
